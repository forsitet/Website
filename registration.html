<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/styles/registration.css">
</head>

<body>
    <div class="container">
        <form action="">
            <h1>Регистрация</h1>

            <div class="input-group">
                <div class="input-field">
                    <input type="text" placeholder="ФИО" required>
                </div>
                <div class="input-field">
                    <input type="text" placeholder="Имя пользователя" required>
                </div>
            </div>

            <div class="input-group">
                <div class="input-field">
                    <input type="email" placeholder="Потча" required>
                </div>
                <div class="input-field">
                    <input type="phone" placeholder="Телефон" pattern="+7[0-9]{10}" required>
                </div>
            </div>

            <div class="input-group">
                <div class="input-field">
                    <input type="password" placeholder="Пароль" required>
                </div>
                <div class="input-field">
                    <input type="password" placeholder="Подтверждение пароля" required>
                </div>
            </div>

            <label><input type="checkbox">Я подтверждаю, 
                что написанная
                 выше информация является 
                 верной и настоящей</label>
            
            <button type="submit" class="btn">Регистрация</button>

        </form>
    </div>
</body>

</html>
