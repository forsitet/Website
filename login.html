<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/styles/login.css">
</head>
<body>
    <div class="container">
        <form action="/" class="form" id="loginForm">
            <h1>Вход в аккаунт</h1>
            <div class="form-group">
                <label for="email" id="label">Почта:</label>
                <input type="text" id="mail" name="email">
                <div class='error'></div>
            </div>
            <div class="form-group">
                <label for="password" id="label">Пароль:</label>
                <input type="password" id="password" name="password">
                <div class='error'></div>
            </div>
            
            <div class="remember-forgot">
                <label><input type="checkbox">Запомнить</label>
                <a href="#">Забыли пароль?</a>
            </div>

            <button type="sumbit" class="btn">Войти</button>

            <div class="registration">
                <p>Нет аккаунта? <a href="registration.html">Зарегистрироваться?</a></p>
            </div>
        </form>
    </div>
    <script src="static/js/login.js"></script>
</body>
</html>
